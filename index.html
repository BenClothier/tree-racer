<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tree Racer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Tree Drill</h1>
      <p class="muted">Guess the tree from the photo.</p>

      <img id="photo" alt="Tree photo" />

      <div class="row">
        <input id="guess" placeholder="Enter tree name" autocomplete="off" />
        <button id="check">Check</button>
        <button id="next" class="secondary">Next</button>
      </div>

      <div id="status" class="status"></div>
      <div id="answer" class="meta muted"></div>
      <div id="score" class="meta"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
