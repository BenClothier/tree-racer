<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tree Racer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Tree Guesser</h1>
      <p class="muted">Guess the tree from the photo.</p>

      <div id="startControls" class="row">
        <button id="begin">Begin</button>
      </div>

      <div id="gameControls" class="row hidden">
        <img id="photo" alt="Tree photo" />
        <input id="guess" placeholder="Enter tree name" autocomplete="off" />
        <button id="check">Check</button>
        <button id="next" class="secondary">Pass</button>
      </div>
      
      <div id="gameStatus" class="row hidden">
        <div id="status" class="status"></div>
        <div id="answer" class="meta muted"></div>
        <div id="score" class="meta"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
